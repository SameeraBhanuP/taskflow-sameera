version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (dbmate) ──────────────────────────────────────────────────────
  migrate:
    image: amacneil/dbmate:2
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    volumes:
      - ./backend/app/db/migrations:/db/migrations
    depends_on:
      db:
        condition: service_healthy
    command: ["--no-dump-schema", "up"]

  # ── Seed (runs once after migrations) ────────────────────────────────────────
  seed:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backend/app/db/seed.sql:/seed.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /seed.sql
    restart: "no"

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  pgdata:
